$content = @"
name: Build Elyon

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleGplayDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: elyon-debug
          path: app/build/outputs/apk/gplay/debug/*-universal-debug.apk
          retention-days: 30
"@

[System.IO.File]::WriteAllText(
    "G:\Elyon\element-x-android-develop\element-x-android-develop\.github\workflows\build.yml",
    $content,
    [System.Text.UTF8Encoding]::new($false)
)
